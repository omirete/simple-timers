<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta
            name="description"
            content="A minimalist web app for creating custom countdowns, going fullscreen during countdown, and offering a clear, flashing alert when time is up."
        />
        <link rel="manifest" href="manifest.json" />
        <link rel="icon" type="image/png" sizes="96x96" href="media/favicon.png" />

        <title>Countdown Timers</title>

        <!-- Link to external CSS -->
        <link rel="stylesheet" href="css/main.css" />
    </head>
    <body>
        <div class="button-container">
            <div class="custom-timers"></div>

            <form class="add-timer-form">
                <input type="number" name="timer-minutes" min="0" placeholder="mm" />
                <span>:</span>
                <input type="number" name="timer-seconds" min="0" max="59" placeholder="ss" />
                <button type="submit">Add Timer</button>
            </form>
        </div>

        <div class="countdown-display">
            <button class="cancel-btn">x</button>
            <div class="countdown-content">
                <div class="time-text"></div>
                <div class="stop-message">(click anywhere to stop)</div>
            </div>
        </div>

        <!-- Link to external JavaScript -->
        <script src="js/main.js"></script>
    </body>
</html>
